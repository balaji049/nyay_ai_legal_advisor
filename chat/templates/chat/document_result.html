{% extends "chat/base.html" %}

{% block content %}

<div class="main-layout">

  <aside class="sidebar">
    <div class="sidebar-top">

      <button class="new-chat-btn"
        onclick="location.href='/document-analyzer/'">
        Analyze Another Document
      </button>

      <button class="new-chat-btn"
        onclick="location.href='/'">
        Back to Chat
      </button>

    </div>
  </aside>

  <div class="chat-wrapper">

    <div id="chatBox">

      <div class="welcome-state">

        <div class="emblem">📊</div>

        <h2>Document Analysis</h2>

        <div class="bubble assistant" id="analysisBox"></div>
<script>
function formatText(text) {

  text = text.replace(/^### (.*$)/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*$)/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*$)/gm, '<h1>$1</h1>');

  text = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g,'<em>$1</em>');

  text = text.replace(/^\d+\.\s(.+)/gm,'<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/gs,'<ol>$1</ol>');

  text = text.replace(/^[\*\-]\s(.+)/gm,'<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>');

  text = text.replace(/\n/g,'<br>');

  return text;
}
</script>

<script>
let rawText = `{{ analysis|escapejs }}`;
document.getElementById("analysisBox").innerHTML = formatText(rawText);
</script>

        <br>

        <button class="chip" onclick="copyText()">
          Copy Analysis
        </button>

      </div>

    </div>

  </div>

</div>

<script>

function copyText(){
  const text = document.querySelector(".bubble").innerText;
  navigator.clipboard.writeText(text);
  alert("Analysis copied!");
}

</script>

{% endblock %}
